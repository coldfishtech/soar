<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SSOAR: Touch the Sky</title>
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <style>
    html {
      background: #f6f8fb; /* subtle cool off-white */
    }
    :root {
      --debug-widget-height: 166px;
    }
    body {
      margin: 0;
      background: #f6f8fb; /* subtle cool off-white */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    /* Prevent text/image selection and callouts during drag on mobile/desktop */
    html, body {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      /* Disable vertical dragging, allow only horizontal gestures */
      touch-action: pan-x;
    }
    #titleStack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 0 0 auto;
    }
    #titleImage {
      width: 200px; /* 50% of previous 400px */
      max-width: 45vw; /* scale cap proportionally */
      height: auto;
      image-rendering: pixelated;
      margin-bottom: 0;
      -webkit-user-drag: none;
      user-select: none;
    }
    #subtitleImage {
      width: 400px;
      max-width: 90vw;
      height: auto;
      image-rendering: pixelated;
      -webkit-user-drag: none;
      user-select: none;
    }
    /* topbar wraps title + musicbar */
    #topbar {
      width: 400px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #sc-widget-debug-wrap {
      width: 100%;
      display: none;
      justify-content: center;
      padding: 8px 0 0;
      box-sizing: border-box;
    }
    #sc-widget-debug-wrap.is-visible {
      display: flex;
    }
    #sc-widget-debug-wrap iframe {
      width: min(640px, calc(100vw - 24px));
      height: var(--debug-widget-height);
      border: 0;
    }
  /* music bar (under title on desktop; next to it on mobile) */
    #musicbar {
      width: 400px;
      max-width: 90vw;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      /* Use the same bold font as the in-game text */
      font-family: Arial Black, Arial, Helvetica, sans-serif;
      font-weight: 900;
    }
    /* inline soar.wav link style for topbar (reuse menu-note styling but tighter) */
  #musicbar .topbar-soar-link { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; margin-left: auto; text-decoration: none; }
  #musicbar .topbar-soar-link svg { width: 15px; height: 15px; display: block; fill: #000; }
  #musicbar .topbar-soar-link:active { filter: brightness(0.85); }
    .music-nowplaying {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      min-width: 0;
      flex: 0 1 auto;
    }
    .playback-controls {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }
    .transport-btn {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: #222;
      cursor: pointer;
    }
    .transport-btn svg {
      width: 15px;
      height: 15px;
      display: block;
      fill: currentColor;
    }
    .transport-btn:active { filter: brightness(0.85); }
    .playback-controls .mute-btn {
      min-width: 22px;
      width: 22px;
      height: 22px;
      padding: 0;
      color: #222;
    }
    .playback-controls .mute-btn svg {
      width: 15px;
      height: 15px;
      display: block;
      fill: currentColor;
    }
    /* Music/SFX topbar UI */
    /* Override the bold parent for specific elements to be Arial regular 9pt with -10 tracking (~ -0.01em) */
    #music-title,
    #musicbar .musicbar-label {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 400;
      font-size: 9pt;            /* ~12px */
      letter-spacing: -0.01em;   /* -10 tracking */
      color: #222;
    }
  #music-title {
      width: auto;
      min-width: 0;
      flex: 0 1 auto;
      max-width: 150px;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      display: inline-flex;
      align-items: center;
    }
  .music-title-track {
      display: inline-flex;
      align-items: center;
      min-width: max-content;
      gap: 24px;
      will-change: transform;
      transform: translateX(0);
    }
  .music-title-track.is-scrolling {
      animation: musicMarquee var(--marquee-duration, 12s) linear infinite;
    }
  .music-title-segment {
      display: inline-block;
    }
  @keyframes musicMarquee {
      from { transform: translateX(0); }
      to { transform: translateX(calc(-1 * var(--marquee-shift, 0px))); }
    }
  .mute-btn { 
      min-width: 34px; 
      height: 24px; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      background: transparent; 
      border: none; 
      border-radius: 0; 
      cursor: pointer; 
  font-family: Arial, Helvetica, sans-serif; 
  font-weight: 400; 
      font-size: 10px; 
      letter-spacing: 0.04em; 
      color: #888888; 
      padding: 0 4px; 
  }
    .mute-btn svg { width: 14px; height: 14px; display: block; }
    .divider { width: 1px; height: 16px; background: #b0b7c2; display: inline-block; margin: 0 6px; }
  /* Make all buttons have no fill or stroke (no background or border) */
  button { background: transparent; border: none; }
    
    canvas {
      background: transparent; /* the canvas draws its own sky, page around is off-white */
      image-rendering: pixelated;
      border: 1px solid #b0b7c2; /* subtle cool grey stroke */
      -webkit-user-drag: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; /* avoid scrolling/zoom while dragging on canvas */
    }
  /* Controls under the canvas (shown on mobile) */
    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; /* avoid selecting/scrolling when sliding arrows */
    }
    .ctrl-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid #b0b7c2;
      background: #222;
      color: #fff;
      font: 24px/56px Arial, sans-serif;
      text-align: center;
      padding: 0;
      cursor: pointer;
      outline: none;
      margin: 0; /* eliminate default button margins */
      -webkit-user-drag: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* arrows: pentagonal via clip-path; remove text visuals */
  .ctrl-arrow {
    /* Replace shape with image buttons */
    width: auto; height: auto; border-radius: 0; font-size: 0; line-height: 0;
    background: transparent; border: none; padding: 0;
    clip-path: none;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ctrl-arrow img { display: block; image-rendering: pixelated; pointer-events: none; }
  /* legacy shape overrides */
  .ctrl-arrow--right, .ctrl-arrow--left { clip-path: none; }
    /* arrow group: tighter spacing and better touch handling */
    .ctrl-group-arrows {
      display: flex;
      gap: 2px;            /* slight visual separation */
      align-items: center;  /* vertically center differing image heights */
      touch-action: none;   /* allow sliding without triggering page scroll/zoom */
    }
    /* jump: replace with image; keep centers aligned */
    .ctrl-btn--jump {
      width: auto; height: auto;
      background: transparent; border: none;
      font-size: 0; line-height: 0;
      -webkit-appearance: none; appearance: none;
      border-radius: 0;
      clip-path: none;
      padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .ctrl-btn--jump img { display: block; image-rendering: pixelated; pointer-events: none; }
    .ctrl-btn:active { filter: brightness(1.15); }

    /* Mobile-friendly layout: let elements span full width and canvas fill viewport remainder */
    @media (max-width: 600px) {
      body {
        align-items: stretch;
        justify-content: flex-start;
        padding: 24px;
        /* Extra bottom padding so bottom browser UI doesn't overlap controls */
        padding-bottom: 72px; /* fallback */
        padding-bottom: calc(72px + env(safe-area-inset-bottom)); /* add safe-area if present */
      }
      #topbar, #controls { width: 100%; max-width: 100%; box-sizing: border-box; }
      /* Place title and musicbar side-by-side on mobile */
      #topbar { flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  #titleStack { align-items: flex-start; }
  /* Half-size title image (50% of previous mobile width) */
  #titleImage { width: 100px; max-width: 20vw; margin-bottom: 0; }
  #subtitleImage { width: 200px; max-width: 40vw; }
      /* Right-align music player so its right edge aligns with canvas right edge */
  #musicbar { margin-left: auto; margin-bottom: 0; box-sizing: border-box; padding: 0 0; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .music-nowplaying { flex: 1 1 100%; order: 0; }
  .playback-controls { gap: 2px; }
  /* place soar link below controls on mobile (icon-sized only clickable) */
  #musicbar .topbar-soar-link { order: 99; width: 100%; justify-content: right; margin-left: 0; margin-right: 8px; margin-top: 8px; }
      /* Increase separation between arrow group and jump button */
      #controls { gap: 80px; }
      /* Canvas width will be set via JS; fallback respects body padding */
      canvas { width: 100%; height: auto; }
      /* Hide desktop-only labels on mobile */
      .desktop-only { display: none; }
    }

    /* (removed) name overlay styles */

    /* Start menu overlay */
    #startMenuBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none; /* shown when menu active */
      z-index: 10;
    }
    /* Centered decorative frame image under the menu */
    #startMenuFrame {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: min(315px, 69vw);
      height: auto;
      display: none;
      z-index: 11;
      pointer-events: none;
      image-rendering: pixelated;
    }
    #startMenu {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: transparent; /* use frame image for chrome */
      border: none;
      box-shadow: none;
      border-radius: 0;
  width: min(240px, 58.5vw);
  padding: 10px 24px;
      display: none; /* shown when menu active */
      z-index: 12; /* above frame */
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      font-size: 14px;
      text-align: center;
      flex-direction: column;
      align-items: stretch;
      box-sizing: border-box;
    }
    /* Add generous vertical spacing between each start menu section */
    #startMenu > * + * { margin-top: 16px; }
    
    /* Game Over dialog shares the same look as the start menu */
    #gameOver {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
      width: min(260px, 62vw); /* slightly wider */
      padding: 18px 28px; /* more breathing room */
      display: none;
      z-index: 12; /* above frame */
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      font-size: 14px;
      text-align: center;
      flex-direction: column;
      align-items: stretch;
      box-sizing: border-box;
    }
    /* Leaderboard panel reuses the same frame/chrome as game over */
    #leaderboardPanel {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      box-shadow: none;
      border-radius: 0;
      width: min(340px, 80vw);
      padding: 16px 24px;
      display: none;
      z-index: 12;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      font-size: 13px;
      text-align: center;
      flex-direction: column;
      align-items: stretch;
      box-sizing: border-box;
      max-height: min(72vh, 520px);
    }
    /* Increase vertical spacing between elements */
    #gameOver > * + * { margin-top: 22px; }
    #leaderboardPanel > * + * { margin-top: 12px; }
    #gameOver h2 { margin: 6px 0 10px 0; font-family: Arial Black, Arial, Helvetica, sans-serif; font-weight: 900; font-size: inherit; text-align: center; }
  #gameOver .score { text-align: center; font-weight: 900; font-size: 52px; margin: 10px 0 4px 0; }
  #gameOver .best { text-align: center; font-weight: 700; font-size: 14px; margin: 6px 0 12px 0; }
  #gameOver .rank { text-align: center; font-weight: 700; font-size: 14px; margin: 6px 0 12px 0; }
  #gameOver .rank.is-loading { display: flex; align-items: center; justify-content: center; }
  #gameOver .rank .rank-loading-dots {
    display: inline-block;
    width: 3ch;
    text-align: left;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
    /* Shared helpers for divider, labels and top image */
  #gameOver .menu-hr { height: 1px; background: linear-gradient(90deg, rgba(0,0,0,0), rgba(0,0,0,0.35), rgba(0,0,0,0)); border: 0; margin: 18px 4px; }
  #leaderboardPanel .menu-hr { height: 1px; background: linear-gradient(90deg, rgba(0,0,0,0), rgba(0,0,0,0.35), rgba(0,0,0,0)); border: 0; margin: 8px 4px; }
    #gameOver .row-label { font-weight: 700; font-size: inherit; }
    #leaderboardPanel .row-label { font-weight: 700; font-size: inherit; }
    #leaderboardPanel .row-subtitle { margin: 0; font-size: 12px; opacity: 0.8; text-align: center; }
    #gameOver .go-sprite { width: 64px; height: auto; image-rendering: pixelated; display: block; margin: 0 auto 6px auto; }
    .menu-actions { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  #gameOver .menu-actions { margin-top: 10px; flex-direction: column; gap: 18px; align-items: center; }
  #gameOver #btn-leaderboard.menu-btn {
    min-width: 0;
    padding: 0;
    border-radius: 0;
    background: transparent;
    color: #000;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  #leaderboardPanel .menu-actions { margin-top: 8px; }
    /* Reuse row layout if needed within game over */
    #gameOver .menu-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; width: 100%; box-sizing: border-box; }
    #startMenu h2 { margin: 6px 0 10px 0; font-family: Arial Black, Arial, Helvetica, sans-serif; font-weight: 900; font-size: inherit; }
    /* Start menu copy and divider */
    #startMenu .menu-blurb { margin: 10px 4px; line-height: 1.3; font-size: inherit; }
    #startMenu .menu-note { margin: 0 4px; line-height: 1.3; font-size: inherit; }
  #startMenu .menu-note a { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; text-decoration: none; }
  #startMenu .menu-note a svg { width: 12px; height: 12px; display: block; fill: #000; }
    #startMenu .menu-hr { height: 1px; background: linear-gradient(90deg, rgba(0,0,0,0), rgba(0,0,0,0.35), rgba(0,0,0,0)); border: 0; margin: 12px 4px; }
    /* Start menu brand stack (title + subtitle) */
  #startMenu .menu-brand { display: flex; flex-direction: column; align-items: center; gap: 4px; margin: 0 auto; width: 100%; }
  #startMenu .menu-brand + .menu-note { margin-top: 6px; }
  #startMenu .menu-logo { width: 100px; max-width: 40vw; height: auto; image-rendering: pixelated; display: block; margin: 0; }
  #startMenu .menu-subtitle { width: 200px; max-width: 100%; height: auto; image-rendering: pixelated; display: block; }
  #startMenu .menu-note + .menu-welcome { margin-top: 14px; }
  #startMenu .menu-welcome { display: none; flex-direction: column; align-items: center; gap: 14px; margin-top: 6px; }
  #startMenu .menu-welcome-text { margin: 0; font-size: 12px; line-height: 1.35; text-align: center; }
  #startMenu .menu-welcome-username { display: inline-block; margin-left: 8px; font-weight: 700; font-size: 1.5em; line-height: 1; }
  #startMenu .menu-link-btn {
    border: none;
    background: transparent;
    color: #000;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    font-weight: 400;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    padding: 2px 4px;
  }
  #startMenu .menu-profile { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  #startMenu .menu-field { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; width: 100%; }
  #startMenu .menu-field label { font-size: 12px; font-weight: 700; opacity: 0.85; }
  #startMenu .menu-field input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #b0b7c2;
    background: rgba(255,255,255,0.75);
    color: #000;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 4px;
    outline: none;
  }
  #startMenu .menu-field input:focus { border-color: #7f8ea3; }
  #startMenu .menu-error { min-height: 14px; margin: 2px 0 0; font-size: 11px; color: #7a2222; text-align: left; }
  #startMenu #btn-profile-back { display: none; align-self: flex-start; margin-top: 2px; }
    #startMenu .row-label { font-weight: 700; font-size: inherit; }
  .menu-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; width: 100%; box-sizing: border-box; }
    .menu-btn, .menu-toggle {
      border: none; background: transparent; color: #000;
      border-radius: 6px; padding: 10px 14px; cursor: pointer; font-weight: 700;
    }
    /* Emphasize primary action buttons (Play / Play Again) with dark fill */
    #startMenu #btn-play.menu-btn,
    #gameOver #btn-restart.menu-btn {
      background: #000; /* solid black fill */
      color: #fff;      /* white text for contrast */
    }
    /* Disabled Play with overlay and loading dots */
    #startMenu #btn-play[disabled] { position: relative; }
    .loading-dots { display:inline-flex; gap:4px; }
    .loading-dots span { width:6px; height:6px; background:#fff; border-radius:50%; animation: dotPulse 1s infinite ease-in-out; opacity:0.4; }
    .loading-dots span:nth-child(2){ animation-delay:0.2s; }
    .loading-dots span:nth-child(3){ animation-delay:0.4s; }
    @keyframes dotPulse { 0%,80%,100% { transform:scale(0.6); opacity:0.3;} 40% { transform:scale(1); opacity:0.9;} }
    #startMenu #btn-play.menu-btn:active,
    #gameOver #btn-restart.menu-btn:active {
      filter: brightness(1.15);
    }
    .menu-toggle { background: transparent; color: #000; }
    .menu-toggle[aria-pressed="true"] { background: transparent; color: #000; }
  .menu-actions { display: flex; justify-content: center; margin-top: 18px; }
  .menu-instruction { font-size: 12px; color: #000; opacity: 0.5; margin-top: 0; padding: 0; text-align: center; }
  /* Ensure no sibling gap above the instruction line under buttons */
  #startMenu > .menu-instruction { margin-top: 10px !important; }
  #gameOver > .menu-instruction { margin-top: 10px !important; }
  .desktop-only { display: block; }
  /* Large gap above the Play button */
  #startMenu .menu-actions { margin-top: 48px; }
    .menu-actions .menu-btn { min-width: 140px; }
  #leaderboardPanel .menu-actions .menu-btn { min-width: 110px; }
  #leaderboardRows {
    width: 100%;
    overflow: auto;
    overflow-x: hidden;
    max-height: min(42vh, 320px);
    border: none;
    background: transparent;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 34px 1fr 58px;
    gap: 10px;
    align-items: center;
    padding: 6px 8px;
    font-size: 12px;
    text-align: left;
    min-width: 0;
  }
  .lb-row + .lb-row { border-top: 1px solid rgba(0,0,0,0.08); }
  .lb-rank { text-align: right; }
  .lb-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-score { text-align: right; font-weight: 700; }

    /* Fantasy RPG panel styling */
    .rpg-panel { color: #2b1b0e; font-family: Georgia, "Times New Roman", serif; text-shadow: 0 1px 0 rgba(255,255,255,0.35); }
    .rpg-title { font-variant: small-caps; letter-spacing: 0.08em; font-weight: 800; font-size: 18px; text-align: center; color: #2b1b0e; }
    .rpg-subtitle { font-variant: small-caps; letter-spacing: 0.06em; text-align: center; color: #3b2716; font-size: 12px; margin-top: 6px; }
    .rpg-prose { color: #3b2716; font-size: 12px; line-height: 1.35; text-align: center; margin: 6px 2px 8px; }
    .rpg-hr { height: 1px; background: linear-gradient(90deg, rgba(43,27,14,0), rgba(43,27,14,0.6), rgba(43,27,14,0)); border: 0; margin: 8px 4px; }
    .rpg-btn { font-variant: small-caps; letter-spacing: 0.08em; color: #2b1b0e; text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
    .rpg-btn:active { filter: none; transform: translateY(0); opacity: 0.8; }
    .rpg-row-label { font-variant: small-caps; letter-spacing: 0.06em; color: #2b1b0e; font-weight: 700; font-size: 12px; }
  </style>
</head>
<body>
  <div id="sc-widget-debug-wrap" aria-hidden="true"></div>
  <div id="topbar">
  <div id="titleStack">
    <img id="titleImage" src="soar_title.png" alt="SSOAR Title" />
    <img id="subtitleImage" src="soar_subtitle.png" alt="SOAR Subtitle" />
  </div>
    <div id="musicbar" aria-label="Music Player">
      <div class="music-nowplaying">
    <span id="music-title" aria-live="polite">
      <span id="music-title-track" class="music-title-track">
        <span id="music-title-primary" class="music-title-segment"></span>
        <span id="music-title-duplicate" class="music-title-segment" aria-hidden="true"></span>
      </span>
    </span>
        <div class="playback-controls" aria-label="Playback Controls">
          <button id="btn-prev-track" class="transport-btn" aria-label="Previous track" title="Previous track" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7 6h2v12H7zM18 6v12l-8-6z"/>
            </svg>
          </button>
          <button id="btn-next-track" class="transport-btn" aria-label="Next track" title="Next track" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M15 6h2v12h-2zM7 6l8 6-8 6z"/>
            </svg>
          </button>

        profileId: leaderboardProfileId,
        username: leaderboardUsername,
        instagram: leaderboardInstagram

    async function ensureLeaderboardProfile(usernameRaw, instagramRaw) {
      const username = normalizeUsername(usernameRaw);
      const instagram = normalizeInstagram(instagramRaw);
      if (!validateUsername(username)) {
        throw new Error('Username must be 3-20 characters.');
      }
      if (
        leaderboardProfileId &&
        leaderboardUsername === username &&
        leaderboardInstagram === instagram
      ) {
        persistLeaderboardIdentity(username, instagram);
        return {
          profileId: leaderboardProfileId,
          username: leaderboardUsername,
          instagram: leaderboardInstagram

    const controlsEl = document.getElementById('controls');

    // Responsive sizing: fill available viewport between title and controls
  function sizeCanvasToViewport() {
      // Use visualViewport when available to account for mobile browser UI
  const vw = (window.visualViewport?.width || window.innerWidth);
  const vh = (window.visualViewport?.height || window.innerHeight);

      // Measure occupied vertical space (title + music bar + margins)
  const titleH = 0; // title is measured as part of the topbar

      const availableH = Math.max(0, vh - (padTop + padBottom + topbarH + controlsH + instrH + bodyGap * 4));

      if (!dotsEl) {
        goRankEl.classList.add('is-loading');
        goRankEl.innerHTML = '<span class="rank-loading-prefix">Rank: </span><span class="rank-loading-dots"></span>';
        dotsEl = goRankEl.querySelector('.rank-loading-dots');
      }
      if (dotsEl) dotsEl.textContent = dots;
    }
    function startRankLoadingAnimation() {
      if (!goRankEl) return;
      stopRankLoadingAnimation();
      setRankLoadingDots(1);
      rankLoadingTimer = setInterval(() => {
        rankLoadingDotCount = (rankLoadingDotCount % 3) + 1;
        setRankLoadingDots(rankLoadingDotCount);
      }, 220);
    }
    function setGameOverRank(rank, state = {}) {
      if (!goRankEl) return;
      if (state.loading) {
        startRankLoadingAnimation();
        return;
      }
      stopRankLoadingAnimation();
      goRankEl.classList.remove('is-loading');
      if (state.unavailable) {
        goRankEl.textContent = 'Rank: --';
        return;
      }
      if (state.error) {
        goRankEl.textContent = 'Rank: --';
        return;
      }
      if (typeof rank === 'number' && Number.isFinite(rank) && rank > 0) {
        goRankEl.textContent = `Rank: #${Math.floor(rank)}`;
      } else {
        goRankEl.textContent = 'Rank: --';
      }
    }
    window.setGameOverRank = setGameOverRank;

    function resetLeaderboardRows() {
      if (!leaderboardRowsEl) return;
      const rows = leaderboardRowsEl.querySelectorAll('.lb-row');
      rows.forEach((row) => row.remove());
    }
    function appendLeaderboardRows(rows) {
      if (!leaderboardRowsEl || !Array.isArray(rows)) return;
      rows.forEach((row) => {
        const rank = Number(row.rank) || 0;
        const username = String(row.username || '-');
        const runScore = Number(row.score) || 0;
        const el = document.createElement('div');
        el.className = 'lb-row';
        el.setAttribute('role', 'row');
        const rankEl = document.createElement('span');
        rankEl.className = 'lb-rank';
        rankEl.textContent = String(rank);
        const nameEl = document.createElement('span');
        nameEl.className = 'lb-name';
        nameEl.textContent = username;
        const scoreEl = document.createElement('span');
        scoreEl.className = 'lb-score';
        scoreEl.textContent = String(runScore);
        el.appendChild(rankEl);
        el.appendChild(nameEl);
        el.appendChild(scoreEl);
        leaderboardRowsEl.appendChild(el);
      });
    }
    async function loadLeaderboard() {
      if (!leaderboardRowsEl || leaderboardLoading) return;
      resetLeaderboardRows();
      if (!window.leaderboardConfigured || !window.leaderboardConfigured()) {
        return;
      }
      leaderboardLoading = true;
      try {
        const data = await window.fetchLeaderboardRuns(LEADERBOARD_PAGE_LIMIT);
        const rows = Array.isArray(data.rows) ? data.rows : [];
        appendLeaderboardRows(rows);
      } catch (e) {
        console.warn('Failed to load leaderboard:', e);
      } finally {
        leaderboardLoading = false;
      }
    }
    function showLeaderboardMenu() {
      if (!leaderboardPanel) return;
      if (gameOverPanel) gameOverPanel.style.display = 'none';
      if (startMenuBackdrop) startMenuBackdrop.style.display = 'block';
      if (startMenuFrameImg) startMenuFrameImg.style.display = 'block';
      leaderboardPanel.style.display = 'flex';
      loadLeaderboard();
    }
    function hideLeaderboardMenu(returnToGameOver = false) {
      if (!leaderboardPanel) return;
      leaderboardPanel.style.display = 'none';
      if (returnToGameOver && !menuActive && !gameRunning && gameOverPanel) {
        gameOverPanel.style.display = 'flex';
        return;
      }
      const gameOverVisible = !!(gameOverPanel && gameOverPanel.style.display !== 'none');
      if (!menuActive && !gameOverVisible) {
        if (startMenuBackdrop) startMenuBackdrop.style.display = 'none';
        if (startMenuFrameImg) startMenuFrameImg.style.display = 'none';
      }
    }

    function showStartMenu() {
      if (startMenuBackdrop) startMenuBackdrop.style.display = 'block';
      if (startMenuFrameImg) startMenuFrameImg.style.display = 'block';
      if (startMenu) startMenu.style.display = 'flex';
      const defaults = window.getLeaderboardProfileDefaults ? window.getLeaderboardProfileDefaults() : null;
      setStartProfileMode(defaults);
      menuActive = true;
  hideLeaderboardMenu(false);
  // Defaults on start screen: both unmuted
      setMusicMuted(false);
  updateMusicMuteUI();
      setProfileError('');
      if (window.leaderboardConfigured && window.leaderboardConfigured() && window.ensureLeaderboardAuthSession) {
        window.ensureLeaderboardAuthSession().catch(() => {});
      }
      // Ensure Game Over panel is not visible when the start menu is shown
      hideGameOverMenu();
    }
    function hideStartMenu() {
      if (startMenuBackdrop) startMenuBackdrop.style.display = 'none';
      if (startMenuFrameImg) startMenuFrameImg.style.display = 'none';
      if (startMenu) startMenu.style.display = 'none';
      menuActive = false;
    }

    function showGameOverMenu(scoreValue = score) {
      hideLeaderboardMenu(false);
      if (startMenuBackdrop) startMenuBackdrop.style.display = 'block';
      if (startMenuFrameImg) startMenuFrameImg.style.display = 'block';
      if (goScoreEl) goScoreEl.textContent = String(Math.floor(scoreValue));
      setGameOverRank(null, {});
      if (gameOverPanel) gameOverPanel.style.display = 'flex';
    }
    function hideGameOverMenu() {
      stopRankLoadingAnimation();
      if (gameOverPanel) gameOverPanel.style.display = 'none';
      // If start menu isn't shown, hide frame/backdrop too
      if (!menuActive && (!leaderboardPanel || leaderboardPanel.style.display === 'none')) {
        if (startMenuBackdrop) startMenuBackdrop.style.display = 'none';
        if (startMenuFrameImg) startMenuFrameImg.style.display = 'none';
      }
    }

    function setMusicEnabled(on) {
      desiredPlaying = !!on;
      try {
        if (scReady && scWidget) {
          if (on) scWidget.play(); else scWidget.pause();
        }
      } catch(e) {}
      // Sync icon/UI after widget processes
      setTimeout(syncMusicStateFromWidget, 200);
    }

    if (usernameInput || instagramInput || profileFormEl || welcomeBackEl) {
      const defaults = window.getLeaderboardProfileDefaults ? window.getLeaderboardProfileDefaults() : null;
      if (defaults) {
        if (usernameInput && defaults.username) usernameInput.value = defaults.username;
        if (instagramInput && defaults.instagram) instagramInput.value = defaults.instagram;
      }
      setStartProfileMode(defaults);
      usernameInput?.addEventListener('input', () => setProfileError(''));
      instagramInput?.addEventListener('input', () => setProfileError(''));
    }
    if (newProfileBtn) {
      newProfileBtn.addEventListener('click', () => {
        forceNewProfileFlow = true;
        if (usernameInput) usernameInput.value = '';
        if (instagramInput) instagramInput.value = '';
        setProfileError('');
        const defaults = window.getLeaderboardProfileDefaults ? window.getLeaderboardProfileDefaults() : null;
        setStartProfileMode(defaults);
        usernameInput?.focus();
      });
    }
    if (profileBackBtn) {
      profileBackBtn.addEventListener('click', () => {
        forceNewProfileFlow = false;
        const defaults = window.getLeaderboardProfileDefaults ? window.getLeaderboardProfileDefaults() : null;
        if (usernameInput) usernameInput.value = defaults && defaults.username ? defaults.username : '';
        if (instagramInput) instagramInput.value = defaults && defaults.instagram ? defaults.instagram : '';
        setProfileError('');
        setStartProfileMode(defaults);
      });
    }

    if (playBtn) {
      playBtn.addEventListener('click', async () => {
        if (playBtn.disabled) return; // gated until music ready
        if (playInFlight) return;
        setProfileError('');
        const usernameRaw = usernameInput ? usernameInput.value : '';
        const instagramRaw = instagramInput ? instagramInput.value : '';
        const normalizedUsername = normalizeUsername(usernameRaw);
        const normalizedInstagram = normalizeInstagram(instagramRaw);
        if (!validateUsername(normalizedUsername)) {
          setProfileError('Username must be 3-20 characters.');
          return;
        }
        if (usernameInput) usernameInput.value = normalizedUsername;
        if (instagramInput) instagramInput.value = normalizedInstagram;
        persistLeaderboardIdentity(normalizedUsername, normalizedInstagram);
        if (window.leaderboardConfigured && window.leaderboardConfigured()) {
          playInFlight = true;
          try {
            if (window.ensureLeaderboardAuthSession) {
              await window.ensureLeaderboardAuthSession();
            }
            if (forceNewProfileFlow && window.startNewLeaderboardProfile) {
              window.startNewLeaderboardProfile();
            }
            await window.ensureLeaderboardProfile(normalizedUsername, normalizedInstagram);
          } catch (e) {
            // Fail-safe: keep gameplay available even if leaderboard/auth is down.
            console.warn('Leaderboard setup failed:', e);
            setProfileError('Leaderboard unavailable. Starting game without rank tracking.');
          }
          playInFlight = false;
        }
        forceNewProfileFlow = false;
        hideStartMenu();
        // Auto-start music on game start
        setMusicEnabled(true);
        restartGame();
      });
    }
    // --- Play gating helpers ---
    function gatePlayButtonUntilMusicReady() {
      disablePlayBtnLoading();
    }
    function disablePlayBtnLoading() {
      playBtn.disabled = true;
      playBtn.dataset.originalText = playBtn.textContent;
      playBtn.innerHTML = '<span class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></span><span style="position:absolute;left:-9999px;">Loading music…</span>';
    }
    function enablePlayBtn() {
      if (!playBtn.disabled) return; // already enabled
      playBtn.disabled = false;
      playBtn.textContent = playBtn.dataset.originalText || 'Play Game';
    }
    // (removed) start-menu toggle event handlers; speaker buttons handle muting now
    if (restartBtn) {
      restartBtn.addEventListener('click', () => {
        hideGameOverMenu();
        hideLeaderboardMenu(false);
        restartGame();
      });
    }
    if (leaderboardBtn) {
      leaderboardBtn.addEventListener('click', () => {
        showLeaderboardMenu();
      });
    }
    if (leaderboardCloseBtn) {
      leaderboardCloseBtn.addEventListener('click', () => {
        hideLeaderboardMenu(true);
      });
    }
  </script>
</body>
</html>
